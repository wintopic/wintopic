<svg xmlns="http://www.w3.org/2000/svg" width="980" height="520" viewBox="0 0 980 520" role="img" aria-label="wintopic animated neon hero">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#050816"/>
      <stop offset="45%" stop-color="#111827"/>
      <stop offset="100%" stop-color="#031B2D"/>
    </linearGradient>
    <linearGradient id="neon" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#00E5FF"><animate attributeName="stop-color" values="#00E5FF;#7C3AED;#00FFA3;#00E5FF" dur="6s" repeatCount="indefinite"/></stop>
      <stop offset="52%" stop-color="#00FFA3"><animate attributeName="stop-color" values="#00FFA3;#00E5FF;#FF3DF2;#00FFA3" dur="6s" repeatCount="indefinite"/></stop>
      <stop offset="100%" stop-color="#7C3AED"><animate attributeName="stop-color" values="#7C3AED;#FF3DF2;#00E5FF;#7C3AED" dur="6s" repeatCount="indefinite"/></stop>
    </linearGradient>
    <radialGradient id="core" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#FFFFFF" stop-opacity=".95"/>
      <stop offset="18%" stop-color="#00E5FF" stop-opacity=".7"/>
      <stop offset="100%" stop-color="#00E5FF" stop-opacity="0"/>
    </radialGradient>
    <filter id="glow" x="-40%" y="-40%" width="180%" height="180%">
      <feGaussianBlur stdDeviation="5" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <pattern id="grid" width="46" height="46" patternUnits="userSpaceOnUse">
      <path d="M46 0H0V46" fill="none" stroke="#7DD3FC" stroke-opacity=".09" stroke-width="1"/>
    </pattern>
  </defs>
  <rect width="980" height="520" rx="34" fill="url(#bg)"/>
  <rect width="980" height="520" rx="34" fill="url(#grid)"/>
  <g opacity=".55">
    <path d="M0 390 C170 318 286 442 456 360 S760 284 980 342" fill="none" stroke="url(#neon)" stroke-width="2">
      <animate attributeName="d" values="M0 390 C170 318 286 442 456 360 S760 284 980 342;M0 350 C170 448 300 294 470 374 S778 440 980 312;M0 390 C170 318 286 442 456 360 S760 284 980 342" dur="9s" repeatCount="indefinite"/>
    </path>
    <path d="M0 126 C200 208 326 74 510 142 S802 240 980 126" fill="none" stroke="url(#neon)" stroke-width="2" opacity=".75">
      <animate attributeName="d" values="M0 126 C200 208 326 74 510 142 S802 240 980 126;M0 164 C220 66 330 210 520 120 S810 76 980 176;M0 126 C200 208 326 74 510 142 S802 240 980 126" dur="8s" repeatCount="indefinite"/>
    </path>
  </g>
  <g transform="translate(490 250)">
    <circle r="152" fill="none" stroke="url(#neon)" stroke-width="2" opacity=".34" stroke-dasharray="22 18"><animateTransform attributeName="transform" type="rotate" from="0" to="360" dur="18s" repeatCount="indefinite"/></circle>
    <circle r="116" fill="none" stroke="#00E5FF" stroke-width="2" opacity=".38" stroke-dasharray="10 20"><animateTransform attributeName="transform" type="rotate" from="360" to="0" dur="12s" repeatCount="indefinite"/></circle>
    <circle r="70" fill="url(#core)" opacity=".42"><animate attributeName="r" values="58;76;58" dur="3s" repeatCount="indefinite"/></circle>
  </g>
  <g filter="url(#glow)">
    <text x="490" y="240" text-anchor="middle" fill="#F8FAFC" font-size="78" font-weight="800" font-family="Segoe UI, Arial, sans-serif">wintopic</text>
    <text x="490" y="286" text-anchor="middle" fill="url(#neon)" font-size="24" font-weight="700" font-family="Segoe UI, Arial, sans-serif">light up ideas, let tools run</text>
  </g>
  <g font-family="Segoe UI, Arial, sans-serif" font-size="15" fill="#BAE6FD">
    <text x="118" y="112">AI</text><text x="798" y="116">AUTOMATION</text><text x="128" y="410">CREATIVE CODE</text><text x="732" y="412">PRODUCT FLOW</text>
  </g>
  <g fill="#FFFFFF">
    <circle cx="122" cy="142" r="3"><animate attributeName="opacity" values=".2;1;.2" dur="2s" repeatCount="indefinite"/></circle>
    <circle cx="850" cy="166" r="4"><animate attributeName="opacity" values="1;.2;1" dur="2.5s" repeatCount="indefinite"/></circle>
    <circle cx="190" cy="356" r="4"><animate attributeName="opacity" values=".25;1;.25" dur="3s" repeatCount="indefinite"/></circle>
    <circle cx="780" cy="352" r="3"><animate attributeName="opacity" values=".2;1;.2" dur="2.2s" repeatCount="indefinite"/></circle>
  </g>
  <g stroke="url(#neon)" stroke-width="3" stroke-linecap="round" opacity=".85">
    <path d="M80 454H310" stroke-dasharray="48 220"><animate attributeName="stroke-dashoffset" values="268;0" dur="3s" repeatCount="indefinite"/></path>
    <path d="M670 66H910" stroke-dasharray="54 230"><animate attributeName="stroke-dashoffset" values="0;284" dur="3.3s" repeatCount="indefinite"/></path>
  </g>
</svg>
