<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="675" viewBox="0 0 1200 675" role="img" aria-label="wintopic 24 hour solar system loop">
  <defs>
    <radialGradient id="space" cx="50%" cy="44%" r="72%">
      <stop offset="0%" stop-color="#18233d"/>
      <stop offset="38%" stop-color="#07111f"/>
      <stop offset="100%" stop-color="#01040a"/>
    </radialGradient>
    <radialGradient id="sun" cx="38%" cy="38%" r="64%">
      <stop offset="0%" stop-color="#fff9c4"/>
      <stop offset="34%" stop-color="#ffb703"/>
      <stop offset="72%" stop-color="#fb5607"/>
      <stop offset="100%" stop-color="#7f1d1d"/>
    </radialGradient>
    <radialGradient id="mercury" cx="35%" cy="30%" r="70%">
      <stop offset="0%" stop-color="#f2e4c8"/>
      <stop offset="55%" stop-color="#8d8274"/>
      <stop offset="100%" stop-color="#2d2a27"/>
    </radialGradient>
    <radialGradient id="venus" cx="35%" cy="30%" r="70%">
      <stop offset="0%" stop-color="#fff1b8"/>
      <stop offset="50%" stop-color="#d49a4a"/>
      <stop offset="100%" stop-color="#5f3615"/>
    </radialGradient>
    <radialGradient id="earth" cx="34%" cy="30%" r="72%">
      <stop offset="0%" stop-color="#d8fbff"/>
      <stop offset="35%" stop-color="#2f9bd8"/>
      <stop offset="70%" stop-color="#1f7a54"/>
      <stop offset="100%" stop-color="#08213a"/>
    </radialGradient>
    <radialGradient id="mars" cx="35%" cy="30%" r="72%">
      <stop offset="0%" stop-color="#ffd1a3"/>
      <stop offset="55%" stop-color="#c65a2e"/>
      <stop offset="100%" stop-color="#4a1d12"/>
    </radialGradient>
    <radialGradient id="jupiter" cx="34%" cy="30%" r="74%">
      <stop offset="0%" stop-color="#fff1d6"/>
      <stop offset="30%" stop-color="#cda37b"/>
      <stop offset="68%" stop-color="#8f5f3d"/>
      <stop offset="100%" stop-color="#2d1d17"/>
    </radialGradient>
    <radialGradient id="saturn" cx="34%" cy="30%" r="74%">
      <stop offset="0%" stop-color="#fff3c8"/>
      <stop offset="48%" stop-color="#d3a85f"/>
      <stop offset="100%" stop-color="#4d3418"/>
    </radialGradient>
    <radialGradient id="uranus" cx="34%" cy="30%" r="74%">
      <stop offset="0%" stop-color="#e5ffff"/>
      <stop offset="50%" stop-color="#74d4e8"/>
      <stop offset="100%" stop-color="#1c5261"/>
    </radialGradient>
    <radialGradient id="neptune" cx="34%" cy="30%" r="74%">
      <stop offset="0%" stop-color="#d8e8ff"/>
      <stop offset="50%" stop-color="#3b6eea"/>
      <stop offset="100%" stop-color="#111b5e"/>
    </radialGradient>
    <filter id="grain" x="-20%" y="-20%" width="140%" height="140%">
      <feTurbulence type="fractalNoise" baseFrequency="0.9" numOctaves="3" seed="17"/>
      <feColorMatrix type="saturate" values="0"/>
      <feComponentTransfer>
        <feFuncA type="table" tableValues="0 0.18"/>
      </feComponentTransfer>
      <feBlend mode="soft-light" in2="SourceGraphic"/>
    </filter>
    <filter id="solar-glow" x="-80%" y="-80%" width="260%" height="260%">
      <feGaussianBlur stdDeviation="13" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="soft-glow" x="-60%" y="-60%" width="220%" height="220%">
      <feGaussianBlur stdDeviation="3.5" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <linearGradient id="ring" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#f8e7b7" stop-opacity="0"/>
      <stop offset="28%" stop-color="#f8e7b7" stop-opacity=".55"/>
      <stop offset="72%" stop-color="#f8e7b7" stop-opacity=".55"/>
      <stop offset="100%" stop-color="#f8e7b7" stop-opacity="0"/>
    </linearGradient>
  </defs>

  <rect width="1200" height="675" fill="url(#space)"/>

  <g opacity=".85">
    <circle cx="80" cy="76" r="1.2" fill="#fff"/>
    <circle cx="176" cy="136" r=".9" fill="#dbeafe"/>
    <circle cx="260" cy="72" r="1.1" fill="#fff"/>
    <circle cx="360" cy="168" r=".8" fill="#bfdbfe"/>
    <circle cx="512" cy="78" r="1" fill="#fff"/>
    <circle cx="644" cy="122" r="1.2" fill="#e0f2fe"/>
    <circle cx="760" cy="72" r=".9" fill="#fff"/>
    <circle cx="910" cy="148" r="1.2" fill="#dbeafe"/>
    <circle cx="1055" cy="86" r=".8" fill="#fff"/>
    <circle cx="1134" cy="192" r="1" fill="#dbeafe"/>
    <circle cx="116" cy="438" r="1" fill="#fff"/>
    <circle cx="232" cy="596" r=".8" fill="#bfdbfe"/>
    <circle cx="390" cy="520" r="1.1" fill="#fff"/>
    <circle cx="538" cy="608" r=".8" fill="#dbeafe"/>
    <circle cx="712" cy="532" r="1" fill="#fff"/>
    <circle cx="864" cy="612" r=".8" fill="#dbeafe"/>
    <circle cx="1018" cy="528" r="1.2" fill="#fff"/>
    <circle cx="1110" cy="602" r=".8" fill="#bfdbfe"/>
  </g>

  <g opacity=".25">
    <ellipse cx="600" cy="337" rx="120" ry="42" fill="none" stroke="#94a3b8"/>
    <ellipse cx="600" cy="337" rx="162" ry="57" fill="none" stroke="#94a3b8"/>
    <ellipse cx="600" cy="337" rx="210" ry="74" fill="none" stroke="#94a3b8"/>
    <ellipse cx="600" cy="337" rx="262" ry="92" fill="none" stroke="#94a3b8"/>
    <ellipse cx="600" cy="337" rx="332" ry="116" fill="none" stroke="#94a3b8"/>
    <ellipse cx="600" cy="337" rx="396" ry="139" fill="none" stroke="#94a3b8"/>
    <ellipse cx="600" cy="337" rx="462" ry="162" fill="none" stroke="#94a3b8"/>
    <ellipse cx="600" cy="337" rx="522" ry="183" fill="none" stroke="#94a3b8"/>
  </g>

  <g transform="translate(600 337)">
    <circle r="48" fill="url(#sun)" filter="url(#solar-glow)">
      <animate attributeName="r" values="46;51;46" dur="24s" repeatCount="indefinite"/>
    </circle>
    <circle r="78" fill="#ffb703" opacity=".06"/>
    <circle r="118" fill="#fb5607" opacity=".035"/>
  </g>

  <g transform="translate(600 337)">
    <g>
      <animateTransform attributeName="transform" type="rotate" from="0" to="4320" dur="86400s" repeatCount="indefinite"/>
      <g transform="translate(120 0) scale(1 .35)">
        <circle r="8" fill="url(#mercury)" filter="url(#grain)"/>
      </g>
    </g>
    <g>
      <animateTransform attributeName="transform" type="rotate" from="35" to="2915" dur="86400s" repeatCount="indefinite"/>
      <g transform="translate(162 0) scale(1 .35)">
        <circle r="13" fill="url(#venus)" filter="url(#grain)"/>
      </g>
    </g>
    <g>
      <animateTransform attributeName="transform" type="rotate" from="90" to="2250" dur="86400s" repeatCount="indefinite"/>
      <g transform="translate(210 0) scale(1 .35)">
        <circle r="14" fill="url(#earth)" filter="url(#grain)"/>
        <g>
          <animateTransform attributeName="transform" type="rotate" from="0" to="8640" dur="86400s" repeatCount="indefinite"/>
          <circle cx="24" cy="0" r="4" fill="#cbd5e1"/>
        </g>
      </g>
    </g>
    <g>
      <animateTransform attributeName="transform" type="rotate" from="140" to="1580" dur="86400s" repeatCount="indefinite"/>
      <g transform="translate(262 0) scale(1 .35)">
        <circle r="11" fill="url(#mars)" filter="url(#grain)"/>
      </g>
    </g>
    <g>
      <animateTransform attributeName="transform" type="rotate" from="205" to="1285" dur="86400s" repeatCount="indefinite"/>
      <g transform="translate(332 0) scale(1 .35)">
        <circle r="28" fill="url(#jupiter)" filter="url(#grain)"/>
        <path d="M-25 -6C-9 -1 9 -2 25 -8" fill="none" stroke="#f1c27d" stroke-opacity=".5" stroke-width="3"/>
        <path d="M-24 7C-6 10 12 8 25 3" fill="none" stroke="#5f3615" stroke-opacity=".35" stroke-width="3"/>
      </g>
    </g>
    <g>
      <animateTransform attributeName="transform" type="rotate" from="260" to="980" dur="86400s" repeatCount="indefinite"/>
      <g transform="translate(396 0) scale(1 .35)">
        <ellipse rx="48" ry="13" fill="none" stroke="url(#ring)" stroke-width="7"/>
        <circle r="24" fill="url(#saturn)" filter="url(#grain)"/>
      </g>
    </g>
    <g>
      <animateTransform attributeName="transform" type="rotate" from="300" to="660" dur="86400s" repeatCount="indefinite"/>
      <g transform="translate(462 0) scale(1 .35)">
        <circle r="18" fill="url(#uranus)" filter="url(#grain)"/>
      </g>
    </g>
    <g>
      <animateTransform attributeName="transform" type="rotate" from="330" to="690" dur="86400s" repeatCount="indefinite"/>
      <g transform="translate(522 0) scale(1 .35)">
        <circle r="18" fill="url(#neptune)" filter="url(#grain)"/>
      </g>
    </g>
  </g>

  <g opacity=".55" filter="url(#soft-glow)">
    <path d="M95 158C220 105 308 116 416 146" fill="none" stroke="#bae6fd" stroke-width="1.5" stroke-dasharray="6 18">
      <animate attributeName="stroke-dashoffset" values="0;-240" dur="120s" repeatCount="indefinite"/>
    </path>
    <path d="M840 520C950 560 1048 552 1130 492" fill="none" stroke="#bae6fd" stroke-width="1.5" stroke-dasharray="5 16">
      <animate attributeName="stroke-dashoffset" values="0;210" dur="140s" repeatCount="indefinite"/>
    </path>
  </g>

  <g font-family="Segoe UI, Arial, sans-serif" text-anchor="middle">
    <text x="600" y="84" fill="#e2e8f0" font-size="34" font-weight="700">wintopic solar system</text>
    <text x="600" y="116" fill="#94a3b8" font-size="16">24-hour seamless orbit loop</text>
  </g>
</svg>
