<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="675" viewBox="0 0 1200 675" role="img" aria-label="24 hour realistic solar system loop">
  <defs>
    <radialGradient id="space" cx="50%" cy="48%" r="74%">
      <stop offset="0%" stop-color="#101827"/>
      <stop offset="44%" stop-color="#050912"/>
      <stop offset="100%" stop-color="#000208"/>
    </radialGradient>

    <radialGradient id="sun" cx="42%" cy="37%" r="68%">
      <stop offset="0%" stop-color="#fff8cf"/>
      <stop offset="28%" stop-color="#ffd166"/>
      <stop offset="58%" stop-color="#f77f00"/>
      <stop offset="100%" stop-color="#3f0f08"/>
    </radialGradient>
    <radialGradient id="shade" cx="34%" cy="28%" r="78%">
      <stop offset="0%" stop-color="#ffffff" stop-opacity=".42"/>
      <stop offset="48%" stop-color="#ffffff" stop-opacity=".04"/>
      <stop offset="100%" stop-color="#000000" stop-opacity=".7"/>
    </radialGradient>
    <radialGradient id="mercury" cx="38%" cy="30%" r="72%">
      <stop offset="0%" stop-color="#d5c7b4"/>
      <stop offset="55%" stop-color="#766e66"/>
      <stop offset="100%" stop-color="#211f1d"/>
    </radialGradient>
    <radialGradient id="venus" cx="36%" cy="30%" r="72%">
      <stop offset="0%" stop-color="#fff0ba"/>
      <stop offset="48%" stop-color="#c88b42"/>
      <stop offset="100%" stop-color="#472711"/>
    </radialGradient>
    <radialGradient id="earth" cx="34%" cy="29%" r="75%">
      <stop offset="0%" stop-color="#e8fbff"/>
      <stop offset="32%" stop-color="#2e8fd0"/>
      <stop offset="57%" stop-color="#1f7a57"/>
      <stop offset="100%" stop-color="#06152a"/>
    </radialGradient>
    <radialGradient id="mars" cx="37%" cy="30%" r="74%">
      <stop offset="0%" stop-color="#ffd0a4"/>
      <stop offset="52%" stop-color="#b8502c"/>
      <stop offset="100%" stop-color="#36120b"/>
    </radialGradient>
    <radialGradient id="jupiter" cx="35%" cy="29%" r="76%">
      <stop offset="0%" stop-color="#fff0d5"/>
      <stop offset="38%" stop-color="#cda37b"/>
      <stop offset="72%" stop-color="#7a4c2f"/>
      <stop offset="100%" stop-color="#24140f"/>
    </radialGradient>
    <radialGradient id="saturn" cx="36%" cy="30%" r="76%">
      <stop offset="0%" stop-color="#fff4c7"/>
      <stop offset="45%" stop-color="#d4aa62"/>
      <stop offset="100%" stop-color="#34200d"/>
    </radialGradient>
    <radialGradient id="uranus" cx="35%" cy="30%" r="76%">
      <stop offset="0%" stop-color="#e9ffff"/>
      <stop offset="52%" stop-color="#78ccdb"/>
      <stop offset="100%" stop-color="#123b46"/>
    </radialGradient>
    <radialGradient id="neptune" cx="36%" cy="30%" r="76%">
      <stop offset="0%" stop-color="#d9e8ff"/>
      <stop offset="54%" stop-color="#355fc7"/>
      <stop offset="100%" stop-color="#090f42"/>
    </radialGradient>

    <linearGradient id="saturnRing" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#e9d9ae" stop-opacity="0"/>
      <stop offset="18%" stop-color="#e9d9ae" stop-opacity=".22"/>
      <stop offset="42%" stop-color="#f4e5be" stop-opacity=".56"/>
      <stop offset="58%" stop-color="#b89f6c" stop-opacity=".48"/>
      <stop offset="82%" stop-color="#e9d9ae" stop-opacity=".2"/>
      <stop offset="100%" stop-color="#e9d9ae" stop-opacity="0"/>
    </linearGradient>

    <filter id="solarGlow" x="-70%" y="-70%" width="240%" height="240%">
      <feGaussianBlur stdDeviation="10" result="blur"/>
      <feColorMatrix in="blur" type="matrix" values="1 0 0 0 0  0 .62 0 0 0  0 0 .24 0 0  0 0 0 .55 0" result="warm"/>
      <feMerge>
        <feMergeNode in="warm"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="surface" x="-20%" y="-20%" width="140%" height="140%">
      <feTurbulence type="fractalNoise" baseFrequency=".76" numOctaves="4" seed="13" result="noise"/>
      <feColorMatrix in="noise" type="saturate" values="0"/>
      <feComponentTransfer>
        <feFuncA type="table" tableValues="0 .22"/>
      </feComponentTransfer>
      <feBlend mode="multiply" in2="SourceGraphic"/>
    </filter>
    <filter id="softShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation=".35"/>
    </filter>
    <clipPath id="earthClip"><circle r="14"/></clipPath>
    <clipPath id="jupiterClip"><circle r="29"/></clipPath>
    <clipPath id="saturnClip"><circle r="24"/></clipPath>
    <clipPath id="sunClip"><circle r="46"/></clipPath>
  </defs>

  <rect width="1200" height="675" fill="url(#space)"/>
  <ellipse cx="590" cy="345" rx="650" ry="250" fill="#0b1220" opacity=".28"/>
  <ellipse cx="600" cy="337" rx="592" ry="206" fill="none" stroke="#253142" stroke-opacity=".26"/>

  <g opacity=".82">
    <circle cx="66" cy="64" r=".9" fill="#e5e7eb"/>
    <circle cx="112" cy="212" r=".55" fill="#cbd5e1"/>
    <circle cx="154" cy="118" r="1.15" fill="#f8fafc"/>
    <circle cx="218" cy="70" r=".65" fill="#cbd5e1"/>
    <circle cx="290" cy="158" r=".8" fill="#e2e8f0"/>
    <circle cx="356" cy="68" r=".7" fill="#dbeafe"/>
    <circle cx="426" cy="126" r=".55" fill="#e5e7eb"/>
    <circle cx="512" cy="62" r=".95" fill="#f8fafc"/>
    <circle cx="672" cy="84" r=".65" fill="#cbd5e1"/>
    <circle cx="744" cy="154" r="1.05" fill="#f8fafc"/>
    <circle cx="812" cy="72" r=".6" fill="#bfdbfe"/>
    <circle cx="908" cy="122" r=".85" fill="#e2e8f0"/>
    <circle cx="1044" cy="72" r=".7" fill="#f8fafc"/>
    <circle cx="1122" cy="166" r=".9" fill="#cbd5e1"/>
    <circle cx="72" cy="500" r=".65" fill="#dbeafe"/>
    <circle cx="186" cy="594" r=".8" fill="#f8fafc"/>
    <circle cx="296" cy="516" r=".55" fill="#cbd5e1"/>
    <circle cx="426" cy="602" r=".72" fill="#f8fafc"/>
    <circle cx="536" cy="548" r=".52" fill="#cbd5e1"/>
    <circle cx="682" cy="610" r=".9" fill="#e5e7eb"/>
    <circle cx="792" cy="540" r=".55" fill="#bfdbfe"/>
    <circle cx="920" cy="614" r=".7" fill="#f8fafc"/>
    <circle cx="1060" cy="532" r=".9" fill="#dbeafe"/>
    <circle cx="1140" cy="602" r=".58" fill="#cbd5e1"/>
  </g>

  <g opacity=".19" fill="none" stroke="#94a3b8" stroke-width="1">
    <ellipse cx="600" cy="337" rx="108" ry="37"/>
    <ellipse cx="600" cy="337" rx="150" ry="52"/>
    <ellipse cx="600" cy="337" rx="198" ry="69"/>
    <ellipse cx="600" cy="337" rx="252" ry="88"/>
    <ellipse cx="600" cy="337" rx="326" ry="114"/>
    <ellipse cx="600" cy="337" rx="392" ry="137"/>
    <ellipse cx="600" cy="337" rx="458" ry="160"/>
    <ellipse cx="600" cy="337" rx="520" ry="182"/>
  </g>

  <g transform="translate(600 337)">
    <g filter="url(#solarGlow)">
      <circle r="46" fill="url(#sun)"/>
      <g clip-path="url(#sunClip)" opacity=".4">
        <path d="M-42 -10C-24 -24 2 -5 22 -18C38 -28 48 -8 48 2C31 -1 18 13 -2 7C-23 1 -29 18 -47 10Z" fill="#fff3a3" opacity=".35"/>
        <path d="M-38 20C-18 6 8 18 28 8C42 1 48 16 42 31C20 31 6 23 -12 30C-26 35 -40 31 -38 20Z" fill="#b7410e" opacity=".28"/>
      </g>
      <circle r="68" fill="#f97316" opacity=".045"/>
      <circle r="98" fill="#f59e0b" opacity=".025"/>
      <animate attributeName="opacity" values=".96;1;.96" dur="86400s" repeatCount="indefinite"/>
    </g>
  </g>

  <g transform="translate(600 337)">
    <g>
      <animateTransform attributeName="transform" type="rotate" from="12" to="4332" dur="86400s" repeatCount="indefinite"/>
      <g transform="translate(108 0) scale(1 .34)">
        <circle r="7" fill="url(#mercury)" filter="url(#surface)"/>
        <circle r="7" fill="url(#shade)" opacity=".44"/>
      </g>
    </g>
    <g>
      <animateTransform attributeName="transform" type="rotate" from="52" to="2932" dur="86400s" repeatCount="indefinite"/>
      <g transform="translate(150 0) scale(1 .34)">
        <circle r="12" fill="url(#venus)" filter="url(#surface)"/>
        <path d="M-10 -2C-4 -7 7 -5 12 -1M-11 5C-2 1 5 4 11 2" stroke="#f7d98a" stroke-opacity=".34" stroke-width="2" fill="none"/>
        <circle r="12" fill="url(#shade)" opacity=".38"/>
      </g>
    </g>
    <g>
      <animateTransform attributeName="transform" type="rotate" from="96" to="2256" dur="86400s" repeatCount="indefinite"/>
      <g transform="translate(198 0) scale(1 .34)">
        <circle r="14" fill="url(#earth)" filter="url(#surface)"/>
        <g clip-path="url(#earthClip)" opacity=".75">
          <path d="M-12 -3C-6 -11 2 -7 3 -1C6 4 12 1 14 8C6 11 0 7 -5 9C-11 10 -15 4 -12 -3Z" fill="#55a868"/>
          <path d="M2 -11C8 -9 11 -4 8 0C5 5 7 9 12 12C4 13 -1 9 -3 4C-6 -2 -2 -6 2 -11Z" fill="#2f7d55"/>
          <path d="M-14 -8C-7 -12 0 -12 6 -8" stroke="#eff6ff" stroke-opacity=".62" stroke-width="1.5" fill="none"/>
          <path d="M-9 5C-2 2 6 4 12 1" stroke="#eff6ff" stroke-opacity=".45" stroke-width="1.2" fill="none"/>
        </g>
        <circle r="14" fill="url(#shade)" opacity=".32"/>
        <g>
          <animateTransform attributeName="transform" type="rotate" from="0" to="8640" dur="86400s" repeatCount="indefinite"/>
          <circle cx="24" cy="0" r="3.6" fill="#cbd5e1"/>
          <circle cx="22.8" cy="-.8" r="3.6" fill="#0f172a" opacity=".28"/>
        </g>
      </g>
    </g>
    <g>
      <animateTransform attributeName="transform" type="rotate" from="144" to="1584" dur="86400s" repeatCount="indefinite"/>
      <g transform="translate(252 0) scale(1 .34)">
        <circle r="10.5" fill="url(#mars)" filter="url(#surface)"/>
        <circle cx="-3" cy="-3" r="2.1" fill="#f4a261" opacity=".32"/>
        <circle cx="4" cy="5" r="1.4" fill="#2b0f09" opacity=".28"/>
        <circle r="10.5" fill="url(#shade)" opacity=".4"/>
      </g>
    </g>
    <g>
      <animateTransform attributeName="transform" type="rotate" from="210" to="1290" dur="86400s" repeatCount="indefinite"/>
      <g transform="translate(326 0) scale(1 .34)">
        <circle r="29" fill="url(#jupiter)" filter="url(#surface)"/>
        <g clip-path="url(#jupiterClip)" fill="none">
          <path d="M-32 -14C-14 -7 9 -11 32 -17" stroke="#f2d2a4" stroke-opacity=".62" stroke-width="5"/>
          <path d="M-32 -3C-10 3 9 0 32 -6" stroke="#8a4f31" stroke-opacity=".45" stroke-width="5"/>
          <path d="M-32 9C-8 15 12 11 32 4" stroke="#f3c892" stroke-opacity=".55" stroke-width="5"/>
          <ellipse cx="14" cy="7" rx="7" ry="4" fill="#9b341c" fill-opacity=".52"/>
        </g>
        <circle r="29" fill="url(#shade)" opacity=".34"/>
      </g>
    </g>
    <g>
      <animateTransform attributeName="transform" type="rotate" from="258" to="978" dur="86400s" repeatCount="indefinite"/>
      <g transform="translate(392 0) scale(1 .34)">
        <ellipse rx="50" ry="13" fill="none" stroke="url(#saturnRing)" stroke-width="8"/>
        <ellipse rx="42" ry="10" fill="none" stroke="#141821" stroke-opacity=".35" stroke-width="2"/>
        <circle r="24" fill="url(#saturn)" filter="url(#surface)"/>
        <g clip-path="url(#saturnClip)" fill="none">
          <path d="M-25 -5C-8 0 8 -3 25 -7" stroke="#f3d790" stroke-opacity=".45" stroke-width="3"/>
          <path d="M-25 7C-9 10 11 8 25 3" stroke="#8b5e2e" stroke-opacity=".28" stroke-width="3"/>
        </g>
        <circle r="24" fill="url(#shade)" opacity=".35"/>
      </g>
    </g>
    <g>
      <animateTransform attributeName="transform" type="rotate" from="302" to="662" dur="86400s" repeatCount="indefinite"/>
      <g transform="translate(458 0) scale(1 .34)">
        <circle r="17" fill="url(#uranus)" filter="url(#surface)"/>
        <circle r="17" fill="url(#shade)" opacity=".31"/>
      </g>
    </g>
    <g>
      <animateTransform attributeName="transform" type="rotate" from="334" to="694" dur="86400s" repeatCount="indefinite"/>
      <g transform="translate(520 0) scale(1 .34)">
        <circle r="17" fill="url(#neptune)" filter="url(#surface)"/>
        <path d="M-9 -3C-2 -7 7 -6 11 -1" stroke="#9cc7ff" stroke-opacity=".28" stroke-width="2" fill="none"/>
        <circle r="17" fill="url(#shade)" opacity=".36"/>
      </g>
    </g>
  </g>
</svg>
