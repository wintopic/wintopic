<svg xmlns="http://www.w3.org/2000/svg" width="980" height="160" viewBox="0 0 980 160" role="img" aria-label="Explore, prototype, refine, share">
  <defs>
    <linearGradient id="flow" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#00D4FF"/>
      <stop offset="50%" stop-color="#55F2C2"/>
      <stop offset="100%" stop-color="#8A6CFF"/>
    </linearGradient>
  </defs>
  <rect width="980" height="160" rx="24" fill="#0B1020"/>
  <path d="M105 80H875" stroke="#FFFFFF" stroke-opacity=".12" stroke-width="10" stroke-linecap="round"/>
  <path d="M105 80H875" stroke="url(#flow)" stroke-width="6" stroke-linecap="round" stroke-dasharray="90 680">
    <animate attributeName="stroke-dashoffset" values="760;0" dur="4.5s" repeatCount="indefinite"/>
  </path>
  <g font-family="Segoe UI, Arial, sans-serif" text-anchor="middle">
    <g transform="translate(130 80)"><circle r="28" fill="#00D4FF" opacity=".22"/><circle r="16" fill="#00D4FF"/><text y="55" fill="#E5E7EB" font-size="18" font-weight="700">Explore</text></g>
    <g transform="translate(375 80)"><circle r="28" fill="#55F2C2" opacity=".22"/><circle r="16" fill="#55F2C2"/><text y="55" fill="#E5E7EB" font-size="18" font-weight="700">Prototype</text></g>
    <g transform="translate(620 80)"><circle r="28" fill="#38BDF8" opacity=".22"/><circle r="16" fill="#38BDF8"/><text y="55" fill="#E5E7EB" font-size="18" font-weight="700">Refine</text></g>
    <g transform="translate(850 80)"><circle r="28" fill="#8A6CFF" opacity=".22"/><circle r="16" fill="#8A6CFF"/><text y="55" fill="#E5E7EB" font-size="18" font-weight="700">Share</text></g>
  </g>
  <circle r="7" fill="#FFFFFF">
    <animateMotion dur="4.5s" repeatCount="indefinite" path="M105 80H875"/>
  </circle>
</svg>
