<svg xmlns="http://www.w3.org/2000/svg" width="980" height="620" viewBox="0 0 980 620" role="img" aria-label="wintopic GitHub 动态概览">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0B1020"/>
      <stop offset="52%" stop-color="#16213E"/>
      <stop offset="100%" stop-color="#073B4C"/>
    </linearGradient>
    <linearGradient id="line" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#00D4FF"/>
      <stop offset="48%" stop-color="#55F2C2"/>
      <stop offset="100%" stop-color="#8A6CFF"/>
    </linearGradient>
    <filter id="glow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="5" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <pattern id="grid" width="32" height="32" patternUnits="userSpaceOnUse">
      <path d="M32 0H0V32" fill="none" stroke="#FFFFFF" stroke-opacity=".055" stroke-width="1"/>
    </pattern>
  </defs>

  <rect width="980" height="620" rx="28" fill="url(#bg)"/>
  <rect width="980" height="620" rx="28" fill="url(#grid)"/>
  <circle cx="132" cy="90" r="110" fill="#00D4FF" opacity=".13">
    <animate attributeName="r" values="90;120;90" dur="7s" repeatCount="indefinite"/>
  </circle>
  <circle cx="830" cy="110" r="130" fill="#8A6CFF" opacity=".13">
    <animate attributeName="r" values="120;150;120" dur="8s" repeatCount="indefinite"/>
  </circle>
  <rect x="-220" y="0" width="160" height="620" fill="#FFFFFF" opacity=".055" transform="skewX(-18)">
    <animateTransform attributeName="transform" type="translate" values="-120 0;1240 0;-120 0" dur="8s" repeatCount="indefinite" additive="sum"/>
  </rect>

  <text x="48" y="68" fill="#F8FAFC" font-size="32" font-weight="700" font-family="Segoe UI, Microsoft YaHei, sans-serif">动态概览</text>
  <text x="48" y="100" fill="#93C5FD" font-size="16" font-family="Segoe UI, Microsoft YaHei, sans-serif">不靠外部统计图，稳定展示当前公开数据</text>
  <path d="M48 122H932" stroke="url(#line)" stroke-width="3" stroke-linecap="round" filter="url(#glow)">
    <animate attributeName="stroke-dasharray" values="80 820;240 660;80 820" dur="5s" repeatCount="indefinite"/>
  </path>

  <g font-family="Segoe UI, Microsoft YaHei, sans-serif">
    <g transform="translate(48 155)">
      <rect width="154" height="112" rx="18" fill="#FFFFFF" opacity=".08"/>
      <text x="20" y="34" fill="#9CA3AF" font-size="15">公开仓库</text>
      <text x="20" y="78" fill="#FFFFFF" font-size="40" font-weight="700">57</text>
    </g>
    <g transform="translate(222 155)">
      <rect width="154" height="112" rx="18" fill="#FFFFFF" opacity=".08"/>
      <text x="20" y="34" fill="#9CA3AF" font-size="15">原创仓库</text>
      <text x="20" y="78" fill="#FFFFFF" font-size="40" font-weight="700">35</text>
    </g>
    <g transform="translate(396 155)">
      <rect width="154" height="112" rx="18" fill="#FFFFFF" opacity=".08"/>
      <text x="20" y="34" fill="#9CA3AF" font-size="15">关注者</text>
      <text x="20" y="78" fill="#FFFFFF" font-size="40" font-weight="700">7</text>
    </g>
    <g transform="translate(570 155)">
      <rect width="154" height="112" rx="18" fill="#FFFFFF" opacity=".08"/>
      <text x="20" y="34" fill="#9CA3AF" font-size="15">累计星标</text>
      <text x="20" y="78" fill="#FFFFFF" font-size="40" font-weight="700">2</text>
    </g>
    <g transform="translate(744 155)">
      <rect width="154" height="112" rx="18" fill="#FFFFFF" opacity=".08"/>
      <text x="20" y="34" fill="#9CA3AF" font-size="15">累计 Fork</text>
      <text x="20" y="78" fill="#FFFFFF" font-size="40" font-weight="700">3</text>
    </g>
  </g>

  <g font-family="Segoe UI, Microsoft YaHei, sans-serif" transform="translate(48 310)">
    <text x="0" y="0" fill="#F8FAFC" font-size="24" font-weight="700">常用语言</text>
    <text x="0" y="28" fill="#94A3B8" font-size="14">按原创仓库主语言统计</text>

    <g transform="translate(0 58)">
      <text x="0" y="18" fill="#E5E7EB" font-size="15">JavaScript</text>
      <rect x="120" y="3" width="290" height="18" rx="9" fill="#FFFFFF" opacity=".08"/>
      <rect x="120" y="3" width="0" height="18" rx="9" fill="url(#line)">
        <animate attributeName="width" values="0;290" dur="1.2s" fill="freeze"/>
      </rect>
      <text x="428" y="18" fill="#CBD5E1" font-size="14">7</text>
    </g>
    <g transform="translate(0 93)">
      <text x="0" y="18" fill="#E5E7EB" font-size="15">CSS</text>
      <rect x="120" y="3" width="290" height="18" rx="9" fill="#FFFFFF" opacity=".08"/>
      <rect x="120" y="3" width="0" height="18" rx="9" fill="#22D3EE">
        <animate attributeName="width" values="0;166" dur="1.2s" begin=".15s" fill="freeze"/>
      </rect>
      <text x="428" y="18" fill="#CBD5E1" font-size="14">4</text>
    </g>
    <g transform="translate(0 128)">
      <text x="0" y="18" fill="#E5E7EB" font-size="15">Python</text>
      <rect x="120" y="3" width="290" height="18" rx="9" fill="#FFFFFF" opacity=".08"/>
      <rect x="120" y="3" width="0" height="18" rx="9" fill="#55F2C2">
        <animate attributeName="width" values="0;166" dur="1.2s" begin=".3s" fill="freeze"/>
      </rect>
      <text x="428" y="18" fill="#CBD5E1" font-size="14">4</text>
    </g>
    <g transform="translate(0 163)">
      <text x="0" y="18" fill="#E5E7EB" font-size="15">TypeScript</text>
      <rect x="120" y="3" width="290" height="18" rx="9" fill="#FFFFFF" opacity=".08"/>
      <rect x="120" y="3" width="0" height="18" rx="9" fill="#8A6CFF">
        <animate attributeName="width" values="0;124" dur="1.2s" begin=".45s" fill="freeze"/>
      </rect>
      <text x="428" y="18" fill="#CBD5E1" font-size="14">3</text>
    </g>
  </g>

  <g font-family="Segoe UI, Microsoft YaHei, sans-serif" transform="translate(535 310)">
    <text x="0" y="0" fill="#F8FAFC" font-size="24" font-weight="700">近期项目</text>
    <text x="0" y="28" fill="#94A3B8" font-size="14">最近维护与推进的公开仓库</text>

    <g transform="translate(0 58)">
      <rect width="370" height="44" rx="12" fill="#FFFFFF" opacity=".08"/>
      <text x="16" y="28" fill="#FFFFFF" font-size="16" font-weight="700">Lightwell</text>
      <text x="150" y="28" fill="#93C5FD" font-size="14">Java / Android</text>
    </g>
    <g transform="translate(0 112)">
      <rect width="370" height="44" rx="12" fill="#FFFFFF" opacity=".08"/>
      <text x="16" y="28" fill="#FFFFFF" font-size="16" font-weight="700">Codex-Desktop-Linux</text>
      <text x="232" y="28" fill="#93C5FD" font-size="14">Automation</text>
    </g>
    <g transform="translate(0 166)">
      <rect width="370" height="44" rx="12" fill="#FFFFFF" opacity=".08"/>
      <text x="16" y="28" fill="#FFFFFF" font-size="16" font-weight="700">ClearMint</text>
      <text x="150" y="28" fill="#93C5FD" font-size="14">Python</text>
    </g>
    <g transform="translate(0 220)">
      <rect width="370" height="44" rx="12" fill="#FFFFFF" opacity=".08"/>
      <text x="16" y="28" fill="#FFFFFF" font-size="16" font-weight="700">gnome-topline</text>
      <text x="190" y="28" fill="#93C5FD" font-size="14">JavaScript</text>
    </g>
  </g>

  <circle cx="930" cy="560" r="5" fill="#55F2C2">
    <animate attributeName="opacity" values=".3;1;.3" dur="1.8s" repeatCount="indefinite"/>
  </circle>
  <text x="48" y="578" fill="#94A3B8" font-size="13" font-family="Segoe UI, Microsoft YaHei, sans-serif">Updated for profile README · animated SVG</text>
</svg>
