name: Profile Animations

on:
  workflow_dispatch:
  schedule:
    - cron: "17 */8 * * *"
  push:
    branches:
      - main
    paths:
      - ".github/workflows/profile-animations.yml"

permissions:
  contents: write

jobs:
  generate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Generate contribution snake
        uses: Platane/snk@v3
        with:
          github_user_name: wintopic
          outputs: |
            dist/github-contribution-grid-snake.svg
            dist/github-contribution-grid-snake-dark.svg?palette=github-dark
            dist/ocean.gif?color_snake=#22d3ee&color_dots=#020617,#0f172a,#155e75,#22d3ee,#a855f7

      - name: Generate 3D contribution skyline
        uses: yoshi389111/github-profile-3d-contrib@0.7.1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          USERNAME: wintopic

      - name: Commit generated animations
        uses: EndBug/add-and-commit@v9
        with:
          add: "dist profile-3d-contrib"
          message: "Generate profile animations"
